ekf_filter_node:
    ros__parameters:
        # Filter update rate (Hz)
        frequency: 30.0
        # Sensor timeout (seconds)
        sensor_timeout: 0.1
        # 2D mode (ignore Z, roll, pitch)
        two_d_mode: true
        # Publish TF from filtered odom
        publish_tf: true

        # Frame configuration
        map_frame: map
        odom_frame: odom
        base_link_frame: base_footprint
        world_frame: odom

        # Wheel odometry input
        odom0: /wheel/odom
        odom0_config:
            [
                true,
                true,
                false,
                false,
                false,
                true,
                true,
                false,
                false,
                false,
                false,
                true,
                false,
                false,
                false,
            ]
        odom0_differential: false
        odom0_relative: false

        # MPU odometry input (IMU-integrated odometry)
        odom1: /imu/odom
        odom1_config:
            [
                false,
                false,
                false,
                false,
                false,
                true,
                false,
                false,
                false,
                false,
                false,
                true,
                false,
                false,
                false,
            ]
        odom1_differential: false
        odom1_relative: false

        # If you want to fuse raw IMU directly instead of mpu_odom, use:
        # imu0: /esibot/imu
        # imu0_config:
        #     [
        #         false,
        #         false,
        #         false,
        #         false,
        #         false,
        #         false,
        #         false,
        #         false,
        #         false,
        #         false,
        #         false,
        #         true,
        #         false,
        #         false,
        #         false,
        #     ]
        # imu0_differential: false
        # imu0_relative: false
        # imu0_remove_gravitational_acceleration: true
