encoder_odom:
    ros__parameters:
        # Input topic for left encoder counts
        left_topic: "esibot/encoders/left"
        # Input topic for right encoder counts
        right_topic: "esibot/encoders/right"
        # Output topic for wheel odometry
        odom_topic: "/wheel/odom"
        # Encoder ticks per wheel revolution
        ticks_per_rev: 20.0
        # Wheel radius (meters)
        wheel_radius: 0.033
        # Distance between wheels (meters)
        wheel_separation: 0.17
        # Publish rate for odometry (Hz)
        publish_rate_hz: 20.0
        # Odometry frame id
        frame_id: "odom"
        # Base frame id
        child_frame_id: "base_footprint"
        # Publish TF odom -> base_footprint
        publish_tf: false
        # Invert left encoder direction
        invert_left: false
        # Invert right encoder direction
        invert_right: false
