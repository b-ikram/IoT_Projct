esibot_sensor_node:
  ros__parameters:
    frame_id: radar_link
    topic_name: /esibot/scan
    publish_rate_hz: 1.0

    angle_min_deg: 0.0
    angle_max_deg: 360.0
    angle_increment_deg: 1.0
    range_min_m: 0.02
    range_max_m: 4.0
    mark_uncovered_as_inf: true

    base_angle_deg: 0.0
    servo_scan_angles_deg: [0.0, 30.0, 60.0]
    sensor_offsets_deg: [0.0, 90.0, 180.0, 270.0]
    sensor_fov_deg: 30.0

    use_mock_data: false

    servo_gpio_pin: 18
    servo_min_angle_deg: 0.0
    servo_max_angle_deg: 180.0
    servo_settle_time_sec: 0.35

    sensor_types: ["trig_echo", "trig_echo", "sig", "sig"]
    sensor_trigger_pins: [17, 22, 24, 5]
    sensor_echo_pins: [27, 23, 25, 6]

    sensor_max_distance_m: 4.0
    sensor_threshold_distance_m: 4.0
    sensor_queue_len: 3
    sig_sensor_samples: 3
    active_sensor_indices: [0, 1, 2, 3]
