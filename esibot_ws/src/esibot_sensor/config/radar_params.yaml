radar_node:
    ros__parameters:
        frame_id: "radar_link"
        topic_name: "/radar/scan"

        # Servo scan angles configuration
        servo_scan_angles_deg: [0.0, 30.0, 60.0]
        servo_gpio_pin: 18
        servo_min_angle_deg: 0.0
        servo_max_angle_deg: 180.0
        servo_settle_time_sec: 0.50

        # HC-SR04 V2 sensor trigger pins (single wire per sensor)
        sensor_trigger_pins: [16, 20, 26, 19]
        sensor_echo_pins: []

        # Sensor angular offsets (degrees) relative to servo angle
        sensor_offsets_deg: [0.0, 90.0, 180.0, 270.0]
