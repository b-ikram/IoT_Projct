radar_node:
  ros__parameters:
    frame_id: radar_link
    topic_name: /radar/scan
    publish_rate: 10.0
    angle_min: -3.14159
    angle_max: 3.14159
    angle_increment: 0.01745
    range_min: 0.1
    range_max: 6.0
    default_range: 2.5
    base_angle_deg: 0.0
    servo_step_angles_deg: [0.0, 60.0, 120.0]
    sensor_offsets_deg: [0.0, 90.0, 180.0, 270.0]
    sensor_fov_deg: 90.0
    mark_uncovered_as_inf: true
